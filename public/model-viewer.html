<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>模型检视器 · 永远的山根乡</title>
  <style>
    html, body { margin: 0; height: 100%; background: #20242c; color: #cdd6e0; font-family: system-ui, sans-serif; overflow: hidden; }
    #view { width: 100vw; height: 100vh; display: block; touch-action: none; }
    #bar { position: fixed; top: 10px; left: 10px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    button { padding: 8px 12px; background: #2f3744; color: #cdd6e0; border: 1px solid #44505f; border-radius: 8px; cursor: pointer; font-size: 13px; }
    button:hover { background: #3a4350; }
    #stat { font-size: 12px; color: #8a97a6; margin-left: 4px; }
    #hint { position: fixed; bottom: 10px; left: 10px; font-size: 12px; color: #7a8794; }
  </style>
</head>
<body>
  <canvas id="view"></canvas>
  <div id="bar">
    <button id="btnAuto">⏯ 自动旋转</button>
    <button id="btnRandom">🎲 随机配色</button>
    <button id="btnWire">▦ 线框</button>
    <span id="stat"></span>
  </div>
  <div id="hint">拖拽 = 旋转 · 滚轮 = 缩放</div>
  <script type="module" src="js/model-viewer.js"></script>
</body>
</html>
